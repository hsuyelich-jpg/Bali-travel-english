<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峇里島旅遊英文學習 Pro (具體對話版)</title>
    <style>
        :root {
            --bali-gold: #d4af37;
            --bali-green: #1b4332;
            --ocean-blue: #0077b6;
            --light-bg: #f8f9fa;
        }
        body {
            font-family: 'PingFang TC', 'Heiti TC', sans-serif;
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 8px solid var(--bali-green);
        }
        .nav-buttons {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: var(--bali-green);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: var(--bali-gold); }
        .control-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        .action-btn {
            background-color: #eee;
            color: #333;
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.9rem;
        }
        .vocab-box {
            background: #f0f4f0;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        #english-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--bali-green); min-height: 3em; }
        #chinese-text { color: #666; margin-bottom: 15px; min-height: 1.5em; }
        .counter { font-size: 0.8rem; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>🌴 Bali Trip Expert</h1>

    <div class="card">
        <h2 id="category-title">點選按鈕開始學習</h2>
        
        <div class="vocab-box" id="vocab-display">
            選擇下方分類，學習更具體的峇里島旅遊對話。
        </div>

        <div id="english-text">Are you ready for your Bali adventure?</div>
        <div id="chinese-text">準備好開始你的峇里島冒險了嗎？</div>
        <div class="counter" id="counter-display"></div>

        <div class="control-btns">
            <button class="action-btn" onclick="speak()">🔊 發音</button>
            <button class="action-btn" onclick="nextPhrase()">➡️ 下一組</button>
        </div>
    </div>

    <div class="nav-buttons">
        <button onclick="startCategory('charter')">🚐 交通運輸</button>
        <button onclick="startCategory('attractions')">🗺️ 景點購物</button>
        <button onclick="startCategory('food')">🍴 推薦美食</button>
        <button onclick="startCategory('hotel')">🏨 飯店日常</button>
    </div>

    <script>
        const studyData = {
            charter: [
                { en: "How much do you charge for a 10-hour full-day charter?", zh: "包車 10 小時怎麼收費？" },
				{ en: "I have a transfer here.", zh: "我需要在這裡轉機。" },
				{ en: "I’d like to check in for my flight.", zh: "我想要辦理航班報到。" },
				{ en: "I have one checked bag.", zh: "我有一件托運行李。" },
				{ en: "Where is the security check?", zh: "（請問安檢在哪裡？）" },
				{ en: "Please place your bag on the conveyor belt.", zh: "請把包包放到輸送帶上。" },
				{ en: "This is my boarding pass.", zh: "這是我的登機證。" },
				{ en: "I have a connecting flight to Bali.", zh: "我有一班飛往峇里島的轉機航班。" },
				{ en: "I'm here for holiday.", zh: "我們來度假的" },
				{ en: "Which terminal should I go to?", zh: "我應該前往哪一個航廈？" },
				{ en: "Is this the correct gate for my next flight?", zh: "這是我下一段航班的登機門嗎？" },
                { en: "Does the price include petrol, parking fees, and the driver's meal?", zh: "價格包含油錢、停車費和司機餐費嗎？" },
                { en: "What is the extra charge per hour if we exceed the time limit?", zh: "如果超時，每小時額外費用是多少？" },
                { en: "Could you pick us up at the lobby tomorrow at 9 AM?", zh: "明天早上 9 點可以到大廳接我們嗎？" },
				{ en: "Can you take us to [place Name]?", zh: "可以帶我們去[地名]嗎？" },
				{ en: "Is it easy to get a Grab around here? ", zh: "這附近好叫 Grab 嗎？" },
				{ en: "Where can I find a taxi?  ?", zh: "哪裡可以搭計程車？" }
				
            ],
            attractions: [
                { en: "I want to see the sunrise at Mount Batur.", zh: "我們想去巴度爾火山看日出。" },
                { en: "How much is the entrance fee for Tanah Lot Temple?", zh: "海神廟的門票是多少錢？" },
				{ en: "How much for a full day tour?", zh: "整天導覽多少錢？" }, 
                { en: "Where is the best spot to take photos of Tegalalang Rice Terrace?", zh: "德格拉朗梯田最適合拍照的地點在哪裡？" },
                { en: "Is there a traditional dance performance at Ubud Palace tonight?", zh: "今晚烏布皇宮有傳統舞蹈表演嗎？" },
                { en: "Can we swim at Suwat Waterfall?", zh: "我們可以在蘇瓦瀑布游泳嗎？" },
				{ en: "The size doesn’t fit.", zh: "尺寸不合。" },
				{ en: "Do you have a smaller / larger size?", zh: "你有小一點／大一點的尺寸嗎？" },
				{ en: "Do you recommend any shopping centers here?", zh: "你推薦這裡的什麼購物中心嗎？" },
				{ en: "Are there any popular shopping malls around?", zh: "這附近有熱門的購物商場嗎？" },
				{ en: "What are the best department stores in this city?", zh: "附近有超市嗎？" },
				{ en: "Is there a supermarket nearby?", zh: "這個城市最好的百貨公司是哪間？" },
				{ en: "No, I’m just browsing.", zh: "沒有，我只是逛逛。" },
				{ en: "Is there a supermarket nearby?", zh: "附近有超市嗎？" },
				{ en: "Can I pay by credit card?", zh: "我可以刷信用卡嗎？" },
				{ en: "Can I get a discount?", zh: "可以打折嗎？？" }
            ],
            food: [
                { en: "Do you have any recommendations for authentic local food nearby?", zh: "這附近有推薦任何道地的在地美食嗎？" },
				{ en: " We're walk-ins, so we'll take any available table.", zh: "我們沒有預約，所以任何空位都可以。"},
				{ en: " We'd like a table for three by the window, please.", zh: "我們想要一個靠窗的三人座位。"},
				{ en: " May I see the menu, please?", zh: "我可以看一下菜單嗎？"},
                { en: "Is this dish very spicy? Can you make it less spicy, please?", zh: "這道菜很辣嗎？可以幫我做不辣（微辣）嗎？" },
                { en: "I'd like to try Babi Guling  and Satay Lilit.", zh: "我想嘗試峇里島烤乳豬飯和沙嗲。" },
				{ en: "I would like to order the Babi Guling (suckling pig rice) and the Bebek Bengil (dirty duck).", zh: "我想要點烤乳豬飯和髒鴨飯。" },
                { en: "What are the signature dishes of this restaurant?", zh: "這間餐廳的招牌菜是什麼？" },
				{ en: " A table for three, please.", zh: "我們三位"},
				{ en: " What drink do you have available?", zh: "你們有什麼飲料？"},
				{ en: " Can we pay separately for our orders?", zh: "我們可以各付各的餐點嗎？"},
				{ en: " What payment methods do you accept?", zh: "你們接受哪些付款方式？"},
				{ en: "heck/Bill, please.", zh: "買單" }
            ],
            hotel: [
				{ en: "Hello, I'd like to check in. I have a reservation under [Your Name]", zh: "你好，我要辦理入住。我用[名字]訂了房。" },
				{ en: "Here is my booking confirmation", zh: "這是我的訂房確認單" },
				{ en: "I booked through Booking.com, and my reservation number is 9487.", zh: "我是透過 Booking.com 訂的，訂單編號是 9487。" },
				{ en: "What time is check-out? ", zh: "退房時間是幾點？" },
				{ en: "Is there Wi-Fi available in the rooms?", zh: "客房內有提供 Wi-Fi 嗎？" },
				{ en: "  What time is breakfast served? ", zh: "早餐幾點供應？" },
				{ en: "Excuse me,are there any regulations for using the pool?", zh: "不好意思，關於游泳池的使用有哪些規定嗎?" },
                { en: "Can I store my luggage at the hotel after check-out?", zh: "我可以在退房後在飯店寄存行李嗎？" },
                { en: "Is there a shuttle bus to the Ubud center?", zh: "有接駁車去烏布市中心嗎？" },
                { en: "Could you help me call a taxi or a Grab car?", zh: "能幫我叫計程車或 Grab 嗎？" }
            ]
        };

        let currentCategory = [];
        let currentIndex = 0;

        function startCategory(key) {
            currentCategory = studyData[key];
            currentIndex = 0;
            const titles = { charter: "🚐 包車對話", attractions: "🗺️ 熱門景點", food: "🍴 推薦美食", hotel: "🏨 飯店日常" };
            document.getElementById('category-title').innerText = titles[key];
            updateDisplay();
        }

        function updateDisplay() {
            if (currentCategory.length === 0) return;
            const item = currentCategory[currentIndex];
            document.getElementById('english-text').innerText = item.en;
            document.getElementById('chinese-text').innerText = item.zh;
            document.getElementById('counter-display').innerText = `進度：${currentIndex + 1} / ${currentCategory.length}`;
            
            // 更新核心單字提示 (簡單顯示當前重點單字)
            const words = item.en.split(' ').slice(0, 3).join(', ');
            document.getElementById('vocab-display').innerHTML = `<strong>本句重點：</strong> ${item.en.match(/\b[A-Z][a-z]+|entrance|charge|recommendation\b/g)?.join(', ') || '常用對話'}`;
        }

        function nextPhrase() {
            if (currentCategory.length === 0) return;
            currentIndex = (currentIndex + 1) % currentCategory.length;
            updateDisplay();
        }

        function speak() {
            const text = document.getElementById('english-text').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    </script>

</body>
</html>
